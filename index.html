<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>Musculation</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0d; --card:#181818; --card2:#222; --border:#2a2a2a;
    --red:#e8001d; --red2:#ff3347; --orange:#ff6b35;
    --text:#f0f0f0; --muted:#666; --green:#22c55e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  .hdr{background:var(--red);padding:0.45rem 0.9rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .hdr h1{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:white;line-height:1;letter-spacing:0.04em;}
  .hdr .sub{font-size:0.58rem;color:rgba(255,255,255,0.75);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
  .prog-lbl{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:white;text-align:right;}

  .snav{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
  .snav-btn{flex:1;padding:0.5rem 0.3rem;border:none;background:none;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.05em;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
  .snav-btn.active{color:var(--text);border-bottom-color:var(--red);}

  /* Bandeau notification */
  .notif-banner{background:#1a1500;border-bottom:1px solid #443300;padding:0.4rem 0.9rem;font-size:0.72rem;color:#ccaa00;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-shrink:0;}
  .notif-banner button{background:#ccaa00;color:#000;border:none;border-radius:4px;padding:0.22rem 0.6rem;font-size:0.68rem;font-weight:700;cursor:pointer;white-space:nowrap;}
  .hidden{display:none !important;}
  .notif-banner.hidden{display:none;}

  .content{flex:1;overflow-y:auto;padding:0.5rem;display:flex;flex-direction:column;gap:0.35rem;}
  .content::-webkit-scrollbar{display:none;}

  .s-hdr{background:linear-gradient(135deg,var(--card) 0%,#1e1010 100%);border:1px solid var(--border);border-radius:8px;padding:0.45rem 0.7rem;}
  .s-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.04em;}
  .s-hdr p{font-size:0.65rem;color:var(--muted);margin-top:0.05rem;}

  .bloc-title{font-family:'Bebas Neue',sans-serif;font-size:0.72rem;letter-spacing:0.15em;color:var(--red);padding-left:0.5rem;border-left:3px solid var(--red);}

  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.2s;}
  .ex-card.is-active{border-color:var(--red);background:#1c1010;}
  .ex-card.is-done{border-color:var(--green);opacity:0.5;}

  .ex-main{display:grid;grid-template-columns:1.7rem 1fr auto;align-items:center;gap:0.45rem;padding:0.5rem 0.65rem;cursor:pointer;}
  .ex-num{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:var(--red);text-align:center;line-height:1;}
  .ex-card.is-active .ex-num{color:var(--red2);}
  .ex-name{font-weight:700;font-size:0.85rem;line-height:1.2;}
  .ex-sub{font-size:0.62rem;color:var(--muted);margin-top:0.08rem;}
  .ex-right{text-align:right;white-space:nowrap;}
  .ex-sets-lbl{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;line-height:1;}
  .ex-reps-lbl{font-size:0.6rem;color:var(--muted);}

  .sets-row{display:none;gap:0.4rem;padding:0 0.65rem 0.55rem;flex-wrap:wrap;user-select:none;touch-action:manipulation;}
  .sets-row.visible{display:flex;}

  .sc{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);cursor:pointer;transition:all 0.15s;user-select:none;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;}
  .sc.done{border-color:var(--green);background:rgba(34,197,94,0.18);color:var(--green);}
  .sc.cur{border-color:var(--red);background:rgba(232,0,29,0.2);color:white;box-shadow:0 0 0 4px rgba(232,0,29,0.3);font-size:1.2rem;}
  .sc:disabled{cursor:default;opacity:0.4;}
  .sc:active{transform:scale(0.88);}

  .ex-detail{display:none;font-size:0.75rem;color:#999;line-height:1.65;padding:0.45rem 0.65rem 0.55rem;border-top:1px solid var(--border);}
  .ex-detail.open{display:block;}
  .btn-goto{background:none;border:1px solid #444;border-radius:5px;color:#666;font-size:0.85rem;padding:0.2rem 0.4rem;cursor:pointer;line-height:1;flex-shrink:0;}
  .btn-goto:active{background:#333;color:var(--text);}
  .charge-btn{background:none;border:1px solid #444;border-radius:6px;color:var(--text);font-size:0.95rem;font-weight:700;padding:0.15rem 0.5rem;min-width:3rem;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;}
  .charge-btn:active{background:#333;}
  .charge-wrap{display:flex;align-items:center;gap:0.3rem;margin-right:0.3rem;}
  .charge-unit{font-size:0.65rem;color:var(--muted);font-weight:600;}
  .ex-detail strong{color:var(--text);}
  .ex-detail .warn{color:var(--orange);}

  /* TIMER */
  .timer-bar{background:var(--card);border-top:2px solid var(--border);padding:0.4rem 0.7rem 0.45rem;flex-shrink:0;display:flex;flex-direction:column;gap:0.32rem;}
  .t-row1{display:flex;align-items:center;gap:0.5rem;}
  .t-disp{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:var(--text);min-width:4rem;transition:color 0.25s;}
  .t-disp.run{color:var(--green);}
  .t-disp.urg{color:var(--red2);}
  .t-prog-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .t-prog{height:100%;background:var(--green);border-radius:3px;transition:width 0.6s linear,background 0.3s;}
  .t-prog.urg{background:var(--red2);}
  .t-status{font-size:0.6rem;color:var(--muted);font-weight:700;white-space:nowrap;text-align:right;min-width:4.5rem;}
  .t-row2{display:flex;gap:0.28rem;}
  .preset{flex:1;padding:0.26rem 0.1rem;border:1px solid var(--border);background:var(--card2);border-radius:5px;color:var(--muted);font-size:0.66rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
  .preset.sel{border-color:var(--red);color:var(--red);background:rgba(232,0,29,0.1);}
  .btn-go{flex:3;padding:0.3rem;border:none;border-radius:6px;background:var(--red);color:white;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;cursor:pointer;}
  .btn-go:active{opacity:0.8;}
  .btn-rst{flex:1;padding:0.3rem;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:0.68rem;font-weight:600;cursor:pointer;}

  #toast{position:fixed;bottom:6.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:0.38rem 1rem;border-radius:20px;font-weight:700;font-size:0.8rem;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
  #toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Écran de configuration (premier lancement) -->
<div id="setup-screen" style="position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;z-index:9999;">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;margin-bottom:0.5rem;">MUSCULATION</div>
  <div style="color:#888;font-size:0.85rem;margin-bottom:2rem;text-align:center;">Premier lancement — configure l'accès au programme</div>
  <div style="width:100%;max-width:360px;">
    <label style="color:#aaa;font-size:0.75rem;font-weight:600;display:block;margin-bottom:0.4rem;">URL WebDAV du programme (NAS)</label>
    <input id="setup-url" type="url" placeholder="http://100.x.x.x:5006/muscu/programmes/programme_fullbody_nov2025.json"
      style="width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;padding:0.7rem;font-size:0.85rem;margin-bottom:1rem;">
    <button onclick="saveSetupUrl()" style="width:100%;background:#e8001d;color:#fff;border:none;border-radius:8px;padding:0.8rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;cursor:pointer;">CONNECTER</button>
    <div style="text-align:center;margin-top:1rem;">
      <span onclick="useLocalFallback()" style="color:#555;font-size:0.75rem;cursor:pointer;text-decoration:underline;">Utiliser sans NAS (localStorage uniquement)</span>
    </div>
  </div>
</div>

<!-- Appli principale -->
<div id="app-screen" class="hidden">
<div id="app">
  <div class="hdr">
    <div><h1 id="appTitre">MUSCULATION</h1><div class="sub" id="appSoustitre">Basic Fit · 3×/semaine</div></div>
    <div style="text-align:right"><div class="prog-lbl" id="progLbl">0 / 0</div><div class="sub">séries · <span onclick="resetSeance()" style="color:#666;cursor:pointer;text-decoration:underline">reset</span></div></div>
  </div>
  <div class="snav">
    <button class="snav-btn active" onclick="showSeance(0)">Séance A</button>
    <button class="snav-btn" onclick="showSeance(1)">Séance B</button>
    <button class="snav-btn" onclick="showSeance(2)">Séance C</button>
  </div>

  <div class="notif-banner" id="notifBanner">
    ⌚ Active les notifs pour les recevoir sur la montre
    <button onclick="requestNotifPerm()">Activer</button>
  </div>

  <div class="content" id="content"></div>

  <div class="timer-bar">
    <div class="t-row1">
      <div class="t-disp" id="tDisp">02:00</div>
      <div class="t-prog-wrap"><div class="t-prog" id="tProg" style="width:100%"></div></div>
      <div class="t-status" id="tStatus">En attente</div>
    </div>
    <div class="t-row2">
      <button class="preset" onclick="setPreset(3,this)">3s</button>
      <button class="preset" onclick="setPreset(60,this)">1'</button>
      <button class="preset" onclick="setPreset(90,this)">1'30</button>
      <button class="preset sel" onclick="setPreset(120,this)">2'</button>
      <button class="preset" onclick="setPreset(180,this)">3'</button>
      <button class="btn-go" id="btnGo" onclick="handleStartBtn()">DÉMARRER</button>
      <button class="btn-rst" onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────

// ── STATE ─────────────────────────────────────────────────────
let curSeance=0, setsState={}, openDetail=new Set(), cursor={ei:1,si:0};

function saveState(){
  try{
    localStorage.setItem('fb_setsState', JSON.stringify(setsState));
    localStorage.setItem('fb_cursor', JSON.stringify(cursor));
    localStorage.setItem('fb_curSeance', curSeance);
  }catch(e){}
}

function loadState(){
  try{
    const ss=localStorage.getItem('fb_setsState');
    const cu=localStorage.getItem('fb_cursor');
    const cs=localStorage.getItem('fb_curSeance');
    if(ss) setsState=JSON.parse(ss);
    if(cu) cursor=JSON.parse(cu);
    if(cs) curSeance=parseInt(cs);
  }catch(e){}
}

// ── SERVICE WORKER + NOTIFICATIONS ───────────────────────────
let swReg = null;

async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('./sw.js');
    console.log('SW enregistré');
    checkNotifBanner();
  } catch(e) {
    console.warn('SW échec:', e);
  }
}

function checkNotifBanner() {
  const banner = document.getElementById('notifBanner');
  if (Notification.permission === 'granted') {
    banner.classList.add('hidden');
  } else if (Notification.permission === 'denied') {
    banner.classList.add('hidden'); // bloqué, rien à faire
  }
  // sinon on laisse le bandeau visible
}

async function requestNotifPerm() {
  const perm = await Notification.requestPermission();
  const banner = document.getElementById('notifBanner');
  if (perm === 'granted') {
    banner.classList.add('hidden');
    showToast('✓ Notifications activées !');
    // Envoyer une notif de test
    sendNotif('✓ Ça marche !', 'Les alertes arriveront sur ta montre.');
  } else {
    banner.classList.add('hidden');
    showToast('Notifications refusées — seul le bip fonctionnera.');
  }
}

async function sendNotif(title, body) {
  if (Notification.permission !== 'granted') return;
  // Via Service Worker (fonctionne en arrière-plan et écran verrouillé)
  if (swReg && swReg.active) {
    swReg.active.postMessage({ type: 'NOTIFY', title, body });
  } else {
    // Fallback direct si SW pas encore actif
    new Notification(title, { body, silent: false });
  }
}

let tDur=120,tRem=120,tRunning=false,tInterval=null,audioCtx=null;

let bellBuffer = null;

async function loadBell() {
  try {
    const ctx = getAudio();
    const raw = atob(BELL_B64);
    const bytes = new Uint8Array(raw.length);
    for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
    bellBuffer = await ctx.decodeAudioData(bytes.buffer);
  } catch(e) { console.warn('Bell load error', e); }
}

function playBell() {
  try {
    const ctx = getAudio();
    if (!bellBuffer) { console.warn('bell not loaded'); return; }
    const src = ctx.createBufferSource();
    const g = ctx.createGain();
    src.buffer = bellBuffer;
    src.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(1.0, ctx.currentTime);
    src.start();
  } catch(e) {}
}

function playDone() {
  playBell();
  setTimeout(() => playBell(), 1100);
}

function setPreset(s,btn){
  tDur=s;tRem=s;tRunning=false;clearInterval(tInterval);
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateTimerUI();setBtn('DÉMARRER');setStatus('En attente');
}
function toggleTimer(){
  if(tRunning){tRunning=false;clearInterval(tInterval);setBtn('REPRENDRE');setStatus('Pause');}
  else{if(tRem<=0)tRem=tDur;tRunning=true;setBtn('PAUSE');setStatus('Repos…');tInterval=setInterval(tick,1000);}
}
function resetTimer(){tRunning=false;clearInterval(tInterval);tRem=tDur;updateTimerUI();setBtn('DÉMARRER');setStatus('En attente');}
function handleStartBtn(){
  // Si le timer est en cours → pause/reprendre
  if(tRunning){ toggleTimer(); return; }
  // Si le timer est en pause (tRem > 0 et pas running) → reprendre
  if(!tRunning && tRem>0 && tRem<tDur){ toggleTimer(); return; }
  // Sinon : coche la série courante et démarre le repos (comme taper le rond)
  tapSet(cursor.ei, cursor.si);
}

function tick(){
  tRem--;
  if(tRem<=0){
    tRem=0;tRunning=false;clearInterval(tInterval);
    setBtn('DÉMARRER');setStatus("C'est parti ! 💪");
    playDone();
    if(navigator.vibrate)navigator.vibrate([300,150,300,150,600]);
    // Notification → montre
    const exs=seances[curSeance].exercices;
    const nextEx=exs[cursor.ei];
    const nextName=nextEx?nextEx.name:'Séance terminée 🎉';
    sendNotif("💪 C'est parti !", `${nextName} — série ${cursor.si+1}`);
    onTimerDone();
  }
  updateTimerUI();
}

function onTimerDone(){
  // Le tap a déjà coché la série et avancé le curseur.
  // Le timer sonne juste pour signaler la fin du repos — on scrolle vers l'actif.
  renderSeance();
  setTimeout(()=>{
    const c=document.getElementById(`c-${curSeance}-${cursor.ei}`);
    if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
  },120);
}

function advanceCursor(){
  const exs=seances[curSeance].exercices,ex=exs[cursor.ei];
  if(!ex)return;
  if(cursor.si+1<ex.sets){cursor.si++;return;}
  let nei=cursor.ei+1;
  while(nei<exs.length&&exs[nei].isWarmup)nei++;
  if(nei<exs.length){
    cursor.ei=nei;cursor.si=0;
    // Fermer tout et ouvrir seulement le nouvel exercice actif
    openDetail.clear();
    openDetail.add(`${curSeance}-${nei}`);
  }
}

function updateTimerUI(){
  const m=Math.floor(tRem/60),s=tRem%60;
  document.getElementById('tDisp').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const bar=document.getElementById('tProg');
  bar.style.width=(tDur>0?(tRem/tDur)*100:0)+'%';
  const urg=tRem<=10&&tRunning;
  document.getElementById('tDisp').className='t-disp'+(tRunning?(urg?' urg':' run'):'');
  bar.className='t-prog'+(urg?' urg':'');
}
function setBtn(t){document.getElementById('btnGo').textContent=t;}
function setStatus(t){document.getElementById('tStatus').textContent=t;}

// ── RENDER ────────────────────────────────────────────────────
function showSeance(idx){
  curSeance=idx;cursor={ei:1,si:0};
  openDetail.clear();
  openDetail.add(`${idx}-1`);
  document.querySelectorAll('.snav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  renderSeance();
}

function scrollToActive() {
  // Scroll précis : s'assure que la carte active est entièrement au-dessus du timer
  setTimeout(() => {
    const card = document.getElementById(`c-${curSeance}-${cursor.ei}`);
    const ct = document.getElementById('content');
    const timer = document.querySelector('.timer-bar');
    if (!card || !ct || !timer) return;
    const cardRect = card.getBoundingClientRect();
    const timerTop = timer.getBoundingClientRect().top;
    if (cardRect.bottom > timerTop - 20) {
      ct.scrollBy({ top: cardRect.bottom - timerTop + 48, behavior: 'smooth' });
    }
  }, 80);
}

function renderSeance(){
  const s=seances[curSeance],ct=document.getElementById('content');
  ct.innerHTML='';
  const h=document.createElement('div');
  h.className='s-hdr';
  h.innerHTML=`<h2>${s.label} — ${s.jour}</h2><p>${s.desc}</p>`;
  ct.appendChild(h);

  s.exercices.forEach((ex,ei)=>{
    if(ei===1){const bt=document.createElement('div');bt.className='bloc-title';bt.textContent='TRAVAIL PRINCIPAL';ct.appendChild(bt);}

    const allDone=checkAllDone(ei);
    const isActive=!ex.isWarmup&&cursor.ei===ei;
    const isOpen=openDetail.has(`${curSeance}-${ei}`);
    const showCircles=!ex.isWarmup&&(isActive||isOpen);

    const card=document.createElement('div');
    card.className='ex-card'+(allDone?' is-done':isActive?' is-active':'');
    card.id=`c-${curSeance}-${ei}`;

    let circles='';
    if(!ex.isWarmup){
      for(let si=0;si<ex.sets;si++){
        const done=!!setsState[`${curSeance}-${ei}-${si}`];
        const isCur=cursor.ei===ei&&cursor.si===si;
        const clickable = isCur || done; // done toujours cliquable pour décocher
        circles+=`<button class="sc${done?' done':isCur?' cur':''}" ${clickable?`onclick="tapSet(${ei},${si})"`:'disabled'} type="button">${si+1}</button>`;
      }
    }

    card.innerHTML=`
      <div class="ex-main" onclick="toggleDetail(${ei})">
        <div class="ex-num">${ex.num}</div>
        <div><div class="ex-name">${ex.name}</div><div class="ex-sub">${ex.sub}</div></div>
        <div class="ex-right" style="display:flex;align-items:center;gap:0.4rem;">
          ${!ex.isWarmup&&!ex.bodyweight?`<div class="charge-wrap"><button class="charge-btn" onclick="editCharge(${ei},event)">${getCharge(ei)||'— kg'}</button></div>`:''}
          ${!ex.isWarmup&&!isActive?`<button class="btn-goto" onclick="event.stopPropagation();goToEx(${ei})">↩</button>`:''}
          <div>
            <div class="ex-sets-lbl">${ex.isWarmup?ex.reps:ex.sets+'×'}</div>
            ${!ex.isWarmup?`<div class="ex-reps-lbl">${ex.reps}</div>`:''}
          </div>
        </div>
      </div>
      ${circles?`<div class="sets-row${showCircles?' visible':''}" id="sr-${curSeance}-${ei}">${circles}</div>`:''}
      <div class="ex-detail${isOpen?' open':''}" id="det-${curSeance}-${ei}">${ex.tip}</div>`;
    ct.appendChild(card);
  });
  updateProgress();
  scrollToActive();
  saveState();
}

function goToEx(ei){
  const ex=seances[curSeance].exercices[ei];
  if(!ex||ex.isWarmup) return;
  let si=0;
  for(let s=0;s<ex.sets;s++){
    if(!setsState[`${curSeance}-${ei}-${s}`]){si=s;break;}
  }
  cursor={ei,si};
  if(tRunning) resetTimer();
  // Fermer tout, ouvrir seulement la carte cible
  openDetail.clear();
  openDetail.add(`${curSeance}-${ei}`);
  showToast('↩ ' + ex.name.split(' ')[0]);
  renderSeance();
}

function toggleDetail(ei){
  const key=`${curSeance}-${ei}`;
  // Fermer toutes les autres cartes d'abord
  openDetail.forEach(k=>{
    const d=document.getElementById(`det-${k}`);
    const s=document.getElementById(`sr-${k}`);
    const kei=parseInt(k.split('-')[1]);
    if(k!==key){
      if(d)d.classList.remove('open');
      if(s&&cursor.ei!==kei)s.classList.remove('visible');
    }
  });
  openDetail.clear();
  const det=document.getElementById(`det-${curSeance}-${ei}`);
  const sr=document.getElementById(`sr-${curSeance}-${ei}`);
  if(false){ // jamais toggle-off via tap (on ferme seulement automatiquement)
    openDetail.delete(key);det.classList.remove('open');
    if(sr&&cursor.ei!==ei)sr.classList.remove('visible');
  } else {
    openDetail.add(key);det.classList.add('open');
    if(sr)sr.classList.add('visible');
    // Scroll pour que toute la carte soit visible, en tenant compte du timer fixe en bas
    setTimeout(()=>{
      const card=document.getElementById(`c-${curSeance}-${ei}`);
      const ct=document.getElementById('content');
      const timer=document.querySelector('.timer-bar');
      if(!card||!ct) return;
      const cardBottom=card.getBoundingClientRect().bottom;
      const timerTop=timer?timer.getBoundingClientRect().top:window.innerHeight;
      if(cardBottom > timerTop - 8) {
        ct.scrollBy({top: cardBottom - timerTop + 16, behavior:'smooth'});
      }
    }, 80);
  }
}

function skipSerie(ei) {
  // Marquer la série courante comme skippée (on avance juste le curseur)
  if (cursor.ei !== ei) return;
  advanceCursor();
  renderSeance();
  setTimeout(()=>{
    const c=document.getElementById(`c-${curSeance}-${cursor.ei}`);
    if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}

function skipExercice(ei) {
  // Sauter tout l'exercice : avancer le curseur jusqu'à l'exercice suivant
  if (cursor.ei !== ei) return;
  const exs = seances[curSeance].exercices;
  let nei = ei + 1;
  while (nei < exs.length && exs[nei].isWarmup) nei++;
  if (nei < exs.length) {
    cursor = { ei: nei, si: 0 };
  }
  if (tRunning) resetTimer();
  renderSeance();
  setTimeout(()=>{
    const c=document.getElementById(`c-${curSeance}-${cursor.ei}`);
    if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}

function tapSet(ei,si){
  const key=`${curSeance}-${ei}-${si}`,wasDone=!!setsState[key];
  setsState[key]=!wasDone;
  if(!wasDone){
    cursor={ei,si};
    advanceCursor();
    renderSeance(); // affichage immédiat : vert + rouge suivant
    if(tRunning){tRunning=false;clearInterval(tInterval);}
    tRem=tDur;toggleTimer();
    showToast('✓ Série faite — repos !');beep(440,.08);
  } else {
    if(tRunning)resetTimer();
    cursor={ei,si};
    renderSeance();
  }
  setTimeout(()=>{const c=document.getElementById(`c-${curSeance}-${cursor.ei}`);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function updateCursorToNext(){
  const exs=seances[curSeance].exercices;
  for(let ei=1;ei<exs.length;ei++){
    if(exs[ei].isWarmup)continue;
    for(let si=0;si<exs[ei].sets;si++){
      if(!setsState[`${curSeance}-${ei}-${si}`]){cursor={ei,si};return;}
    }
  }
}

function checkAllDone(ei){
  const ex=seances[curSeance].exercices[ei];
  if(!ex||ex.isWarmup)return false;
  for(let si=0;si<ex.sets;si++){if(!setsState[`${curSeance}-${ei}-${si}`])return false;}
  return true;
}

function updateProgress(){
  const s=seances[curSeance];let total=0,done=0;
  s.exercices.forEach((ex,ei)=>{
    if(ex.isWarmup)return;total+=ex.sets;
    for(let si=0;si<ex.sets;si++){if(setsState[`${curSeance}-${ei}-${si}`])done++;}
  });
  document.getElementById('progLbl').textContent=`${done} / ${total}`;
}

function resetSeance(){
  if(!confirm('Remettre la séance à zéro ?')) return;
  setsState={};
  cursor={ei:1,si:0};
  resetTimer();
  openDetail.clear();
  openDetail.add(`${curSeance}-1`);
  saveState();
  renderSeance();
}

function getCharge(ei){
  const k=`charge-${curSeance}-${ei}`;
  return localStorage.getItem(k)||'';
}
function setCharge(ei,val){
  const k=`charge-${curSeance}-${ei}`;
  if(val===''||val===null) localStorage.removeItem(k);
  else localStorage.setItem(k,val);
}
function editCharge(ei,e){
  e.stopPropagation();
  const current=getCharge(ei);
  const val=prompt('Charge pour cet exercice (kg) :', current);
  if(val===null) return; // annulé
  const num=parseFloat(val.replace(',','.'));
  setCharge(ei, isNaN(num)?'':String(num));
  renderSeance();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

let seances = null;
let programmeUrl = localStorage.getItem('fb_programme_url') || '';

async function loadProgramme() {
  // Si URL configurée → charger depuis le NAS
  if (programmeUrl) {
    try {
      const r = await fetch(programmeUrl, {credentials:'include'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      seances = data.seances;
      return true;
    } catch(e) {
      console.warn('Impossible de charger le programme depuis le NAS:', e);
    }
  }
  // Fallback : programme embarqué en cache localStorage
  const cached = localStorage.getItem('fb_programme_cache');
  if (cached) {
    seances = JSON.parse(cached).seances;
    showToast('⚠ NAS hors ligne — programme en cache');
    return true;
  }
  return false;
}

function showSetup() {
  document.getElementById('setup-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

function hideSetup() {
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
}

async function saveSetupUrl() {
  const url = document.getElementById('setup-url').value.trim();
  if (!url) return;
  programmeUrl = url;
  localStorage.setItem('fb_programme_url', url);
  const ok = await loadProgramme();
  if (ok) {
    // Mettre en cache pour mode hors ligne
    const r = await fetch(programmeUrl, {credentials:'include'});
    const data = await r.json();
    localStorage.setItem('fb_programme_cache', JSON.stringify(data));
    hideSetup();
    try {
      const d = JSON.parse(localStorage.getItem('fb_programme_cache') || '{}');
      if (d.meta && d.meta.titre) document.getElementById('appTitre').textContent = d.meta.titre;
      if (d.meta && d.meta.soustitre) document.getElementById('appSoustitre').textContent = d.meta.soustitre;
    } catch(e) {}
    initApp();
  } else {
    alert('Impossible de charger le programme. Vérifie l\'URL et que Tailscale est actif.');
  }
}


// ── INIT ──────────────────────────────────────────────────────
initSW();

function useLocalFallback() {
  // Programme de base embarqué pour fonctionner sans NAS
  fetch('programme_fullbody_nov2025.json')
    .then(r=>r.json())
    .then(data=>{
      seances=data.seances;
      localStorage.setItem('fb_programme_cache', JSON.stringify(data));
      hideSetup();
      initApp();
    })
    .catch(()=>alert('Fichier programme introuvable.'));
}

function initApp() {
  loadState();
  openDetail.add(`${curSeance}-${cursor.ei}`);
  document.querySelectorAll('.snav-btn').forEach((b,i)=>b.classList.toggle('active',i===curSeance));
  renderSeance();
  updateTimerUI();
  loadBell();
  checkNotifBanner();
}

// Démarrage
(async () => {
  const ok = await loadProgramme();
  if (!ok) {
    showSetup();
  } else {
    // Mettre à jour le cache si chargé depuis le NAS
    if (programmeUrl) {
      try {
        const r = await fetch(programmeUrl, {credentials:'include'});
        const data = await r.json();
        localStorage.setItem('fb_programme_cache', JSON.stringify(data));
      } catch(e) {}
    }
    hideSetup();
    try {
      const d = JSON.parse(localStorage.getItem('fb_programme_cache') || '{}');
      if (d.meta && d.meta.titre) document.getElementById('appTitre').textContent = d.meta.titre;
      if (d.meta && d.meta.soustitre) document.getElementById('appSoustitre').textContent = d.meta.soustitre;
    } catch(e) {}
    initApp();
  }
})();
</script>
